name: Test - capture only (no API key needed)

# Manually-triggered smoke test. Runs the automated test suite, then one
# capture-only cycle (--skip-analysis) against the live TxDOT page.
# Requires NO secrets and never calls the Claude API.
#
# After the run finishes, open the run's Summary page and download the
# "capture-test-results" artifact: it contains the captured .jpg files
# and collector.log, so you can visually confirm both cameras were
# captured correctly.

on:
  workflow_dispatch: {}

jobs:
  test-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automated test suite
        run: pytest tests/ -v

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run one capture-only cycle (no Claude API calls)
        run: python -m src.main --mode single-run --skip-analysis

      - name: Show capture log
        if: always()
        run: |
          echo "=== logs/collector.log (last 40 lines) ==="
          tail -40 logs/collector.log || true
          echo ""
          echo "=== captured image files ==="
          find data/images -name "*.jpg" -exec ls -la {} \; || true

      - name: Upload captured images and log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capture-test-results
          path: |
            data/images
            logs/collector.log
          if-no-files-found: warn
          retention-days: 7
