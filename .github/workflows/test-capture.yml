name: Test - capture only (no API key needed)

# Manually-triggered smoke test. Runs the automated test suite, then one
# capture-only cycle (--skip-analysis) against the live TxDOT page.
# Requires NO secrets and never calls the Claude API — safe to run
# immediately after uploading the repo, before configuring anything.
#
# Captured images are committed back to the repository under data/images/
# (folders named after each camera), and also uploaded as a downloadable
# artifact named "capture-test-results" as a backup.

on:
  workflow_dispatch: {}

jobs:
  test-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automated test suite
        run: pytest tests/ -v

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run one capture-only cycle (no Claude API calls)
        run: python -m src.main --mode single-run --skip-analysis

      - name: Show capture log
        if: always()
        run: |
          echo "=== logs/collector.log (last 40 lines) ==="
          tail -40 logs/collector.log || true
          echo ""
          echo "=== captured image files ==="
          find data/images -name "*.jpg" -exec ls -la {} \; || true

      - name: Commit captured images back to the repository
        if: always()
        run: |
          git config user.name "txdot-camera-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/images logs/collector.log 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new images to commit."
            exit 0
          fi

          git commit -m "Add test capture snapshots [skip ci]"

          max_attempts=5
          attempt=1
          until git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }}; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Push failed after $attempt attempts; giving up."
              exit 1
            fi
            echo "Push attempt $attempt failed; retrying..."
            attempt=$((attempt + 1))
            sleep $(( (RANDOM % 10) + 5 ))
          done
          echo "Push succeeded on attempt $attempt."

      - name: Upload captured images and log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capture-test-results
          path: |
            data/images
            logs/collector.log
          if-no-files-found: warn
          retention-days: 7
