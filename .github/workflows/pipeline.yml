name: Vehicle Pipeline (Identify + Price)

# End-to-end: Step 1 identifies vehicles (make/model/year/direction) via the
# Batch API, then Step 2 adds a market price range. Both steps are resumable, so
# if the identification batch does not finish within max_wait the job commits its
# progress and skips pricing; just re-run the workflow to continue and then price.

on:
  workflow_dispatch:
    inputs:
      identify_model:
        description: "Model for identification (Step 1)"
        type: choice
        default: claude-fable-5
        options: [claude-fable-5, claude-opus-4-8, claude-sonnet-5, claude-haiku-4-5]
      price_provider:
        description: "Pricing source (Step 2)"
        type: choice
        default: claude
        options: [claude, api]
      price_model:
        description: "Model for pricing (provider=claude)"
        type: choice
        default: claude-opus-4-8
        options: [claude-opus-4-8, claude-fable-5, claude-sonnet-5, claude-haiku-4-5]
      price_detail:
        description: "Coarsest pricing tier (body = most coverage)"
        type: choice
        default: body
        options: [body, make, model]
      location:
        description: "Market/region for price estimates"
        default: "Dallas, Texas"
      limit:
        description: "Max images this run (blank = all; keep small to test first)"
        default: "25"
      max_wait:
        description: "Seconds to poll for the identification batch before giving up"
        default: "18000"

permissions:
  contents: write

concurrency:
  group: traffic-vehicle-csv
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ultralytics anthropic opencv-python-headless pillow httpx

      - name: Estimate identification cost (no API calls)
        run: |
          python identify_vehicles_batch.py \
            --input "data/images" --recursive \
            --model "${{ inputs.identify_model }}" --estimate

      # ---------------- Step 1: identify (Batch API) ----------------
      - name: Step 1 - identify vehicles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          LIMIT_ARG=""
          if [ -n "${{ inputs.limit }}" ]; then LIMIT_ARG="--limit ${{ inputs.limit }}"; fi
          python identify_vehicles_batch.py \
            --input "data/images" --recursive \
            --output data/output/vehicles \
            --model "${{ inputs.identify_model }}" \
            --mode run \
            --max-wait "${{ inputs.max_wait }}" \
            $LIMIT_ARG

      # ---------------- guard: did identification finish? ----------------
      - name: Check identification complete
        id: guard
        run: |
          python - <<'PY'
          import json, os, pathlib
          p = pathlib.Path("data/output/vehicles/batches.json")
          complete = False
          if p.exists():
              m = json.loads(p.read_text())
              pending = [b for b in m.get("batches", []) if not b.get("collected")]
              complete = (len(pending) == 0)
              print(f"pending identification batches: {len(pending)}")
          else:
              print("no identification manifest found")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"complete={'true' if complete else 'false'}\n")
          PY

      # ---------------- Step 2: price (only if Step 1 finished) ----------------
      - name: Step 2 - price vehicles
        if: steps.guard.outputs.complete == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VEHICLE_PRICE_API_URL: ${{ secrets.VEHICLE_PRICE_API_URL }}
          VEHICLE_PRICE_API_KEY: ${{ secrets.VEHICLE_PRICE_API_KEY }}
        run: |
          python price_vehicles.py \
            --input data/output/vehicles/vehicles.csv \
            --output data/output/vehicles/vehicles_priced.csv \
            --provider "${{ inputs.price_provider }}" \
            --model "${{ inputs.price_model }}" \
            --detail "${{ inputs.price_detail }}" \
            --location "${{ inputs.location }}"

      - name: Note if identification did not finish
        if: steps.guard.outputs.complete != 'true'
        run: |
          echo "::warning::Identification batch did not finish within max_wait."
          echo "Progress is committed. Re-run this workflow to resume; pricing was skipped this run."

      # ---------------- persist everything ----------------
      - name: Commit outputs
        if: always()
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/vehicles/vehicles.csv \
                  data/output/vehicles/vehicles_priced.csv \
                  data/output/vehicles/batches.json \
                  data/output/vehicles/price_cache.json \
                  data/output/vehicles/price_batch.json 2>/dev/null || true
          if git diff --cached --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "Vehicle pipeline: identify (${{ inputs.identify_model }}) + price (${{ inputs.price_provider }})"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push retry $i"; git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          done
          echo "push failed after retries" >&2; exit 1

      - name: Upload CSV artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vehicle-pipeline-csv
          path: |
            data/output/vehicles/vehicles.csv
            data/output/vehicles/vehicles_priced.csv
